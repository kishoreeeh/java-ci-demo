name: Java Build

on:
  push:
    branches:
      - main

  schedule:
    - cron: '0 * * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Tests
        run: mvn test

      - name: Success Message
        if: success()
        run: echo "Build Passed Successfully"